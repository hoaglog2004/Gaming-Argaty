<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập | Argaty</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Boxicons -->
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />

    <!-- Main CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}" />

    <style>
      .input-icon {
        position: relative;
      }

      .input-icon__icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 9px;
        background: rgba(34, 211, 238, 0.1);
        border: 1px solid rgba(34, 211, 238, 0.28);
        color: var(--accent-cyan);
        pointer-events: none;
        transition: all var(--transition-fast);
      }

      .input-icon__icon svg {
        width: 16px;
        height: 16px;
        display: block;
      }

      .input-icon input {
        padding-left: 52px;
      }

      .input-icon.has-toggle input {
        padding-right: 50px;
      }

      .input-icon:focus-within .input-icon__icon {
        background: rgba(168, 85, 247, 0.15);
        border-color: rgba(168, 85, 247, 0.35);
        color: var(--primary-light);
        box-shadow: 0 0 14px rgba(139, 92, 246, 0.32);
      }

      .toggle-password {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        width: 30px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text-muted);
        cursor: pointer;
        transition: all var(--transition-fast);
      }

      .toggle-password:hover {
        color: var(--accent-cyan);
        border-color: rgba(34, 211, 238, 0.35);
        background: rgba(34, 211, 238, 0.08);
      }

      .toggle-password__icon {
        display: none;
      }

      .toggle-password .toggle-password__icon--hidden {
        display: block;
      }

      .toggle-password.is-revealed .toggle-password__icon--hidden {
        display: none;
      }

      .toggle-password.is-revealed .toggle-password__icon--revealed {
        display: block;
      }

      .toggle-password__icon svg {
        width: 16px;
        height: 16px;
        display: block;
      }
    </style>
  </head>
  <body>
    <!-- Cosmic Background -->
    <div class="cosmic-bg">
      <div class="stars"></div>
      <div class="stars-2"></div>
      <div class="nebula nebula-1"></div>
      <div class="nebula nebula-2"></div>
      <div class="shooting-star"></div>
      <div class="shooting-star"></div>
    </div>

    <!-- Auth Content -->
    <div class="auth-page">
      <div class="auth-container">
        <div class="auth-card">
          <!-- Header -->
          <div class="auth-header">
            <a th:href="@{/}" class="auth-logo">
              <div class="auth-logo__icon">
                <i class="bx bx-planet"></i>
              </div>
              <span class="auth-logo__text">ARGATY</span>
            </a>
            <h1 class="auth-title">Đăng nhập</h1>
            <p class="auth-subtitle">
              Chào mừng bạn trở lại! Đăng nhập để tiếp tục.
            </p>
          </div>

          <!-- Alerts -->
          <div th:if="${param.error}" class="alert alert-danger mb-4">
            <i class="bx bx-error-circle"></i>
            <span>Email hoặc mật khẩu không đúng</span>
          </div>

          <div th:if="${param.banned}" class="alert alert-danger mb-4">
            <i class="bx bx-block"></i>
            <span>Bạn đã bị ban.</span>
            <span th:if="${param.reason}">
              Lý do: <strong th:text="${param.reason}"></strong
            ></span>
          </div>

          <div th:if="${param.disabled}" class="alert alert-danger mb-4">
            <i class="bx bx-lock-alt"></i>
            <span>Tài khoản của bạn đã bị khóa.</span>
          </div>

          <div th:if="${param.logout}" class="alert alert-success mb-4">
            <i class="bx bx-check-circle"></i>
            <span>Đăng xuất thành công</span>
          </div>

          <div th:if="${param.registered}" class="alert alert-success mb-4">
            <i class="bx bx-check-circle"></i>
            <span>Đăng ký thành công! Vui lòng đăng nhập. </span>
          </div>

          <div th:if="${param.resetSuccess}" class="alert alert-success mb-4">
            <i class="bx bx-check-circle"></i>
            <span>Đặt lại mật khẩu thành công! Vui lòng đăng nhập.</span>
          </div>

          <!-- Login Form -->
          <form th:action="@{/auth/login}" method="post" class="auth-form">
            <input
              type="hidden"
              th:if="${_csrf != null}"
              th:name="${_csrf.parameterName}"
              th:value="${_csrf.token}"
            />

            <div class="form-group">
              <label class="form-label">Email</label>
              <div class="input-icon">
                <span class="input-icon__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 6h16v12H4z" />
                    <path d="m4 7 8 6 8-6" />
                  </svg>
                </span>
                <input
                  type="email"
                  name="email"
                  class="form-control"
                  placeholder="Nhập email của bạn"
                  required
                  autofocus
                />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">Mật khẩu</label>
              <div class="input-icon has-toggle">
                <span class="input-icon__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M7 11V8a5 5 0 0 1 10 0v3" />
                    <rect x="5" y="11" width="14" height="10" rx="2" />
                  </svg>
                </span>
                <input
                  type="password"
                  name="password"
                  id="password"
                  class="form-control"
                  placeholder="Nhập mật khẩu"
                  required
                />
                <button
                  type="button"
                  class="toggle-password"
                  title="Hiện/Ẩn mật khẩu"
                  onclick="togglePassword('password', this)"
                >
                  <span class="toggle-password__icon toggle-password__icon--hidden" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" />
                      <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24" />
                      <path d="M3 3l18 18" />
                    </svg>
                  </span>
                  <span class="toggle-password__icon toggle-password__icon--revealed" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" />
                      <circle cx="12" cy="12" r="3" />
                    </svg>
                  </span>
                </button>
              </div>
            </div>

            <div class="auth-remember">
              <label class="form-check">
                <input
                  type="checkbox"
                  name="remember-me"
              </label>
              <a th:href="@{/auth/forgot-password}" class="auth-forgot"
                      btn.classList.add("is-revealed");
            </div>

                      btn.classList.remove("is-revealed");
              Đăng nhập
            </button>
          </form>

          <!-- Divider -->
          <div class="auth-divider">
            <span>Hoặc</span>
          </div>

          <!-- Social Login -->
          <div class="auth-social">
            <a
              th:href="@{/oauth2/authorization/google}"
              class="auth-social__btn"
            >
              <i class="bx bxl-google"></i>
            </a>
            <a
              th:href="@{/oauth2/authorization/facebook}"
              class="auth-social__btn"
            >
              <i class="bx bxl-facebook"></i>
            </a>
          </div>

          <!-- Footer -->
          <div class="auth-footer mt-4">
            <p>
              Chưa có tài khoản? <a th:href="@{/auth/register}">Đăng ký ngay</a>
            </p>
          </div>
        </div>
      </div>
    </div>

    <script>
      function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        const icon = btn.querySelector("i");

        if (input.type === "password") {
          input.type = "text";
          icon.classList.remove("bx-hide");
          icon.classList.add("bx-show");
        } else {
          input.type = "password";
          icon.classList.remove("bx-show");
          icon.classList.add("bx-hide");
        }
      }
    </script>
  </body>
</html>
