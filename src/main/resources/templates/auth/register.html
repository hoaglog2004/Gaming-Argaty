<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký | Argaty</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Boxicons -->
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />

    <!-- Main CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}" />

    <style>
      .input-icon {
        position: relative;
      }

      .input-icon__icon {
        position: absolute;
        left: 12px;
        top: 50%;
        transform: translateY(-50%);
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 9px;
        background: rgba(34, 211, 238, 0.1);
        border: 1px solid rgba(34, 211, 238, 0.28);
        color: var(--accent-cyan);
        pointer-events: none;
        transition: all var(--transition-fast);
      }

      .input-icon__icon svg {
        width: 16px;
        height: 16px;
        display: block;
      }

      .input-icon input {
        padding-left: 52px;
      }

      .input-icon.has-toggle input {
        padding-right: 50px;
      }

      .input-icon:focus-within .input-icon__icon {
        background: rgba(168, 85, 247, 0.15);
        border-color: rgba(168, 85, 247, 0.35);
        color: var(--primary-light);
        box-shadow: 0 0 14px rgba(139, 92, 246, 0.32);
      }

      .toggle-password {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        width: 30px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text-muted);
        cursor: pointer;
        transition: all var(--transition-fast);
      }

      .toggle-password:hover {
        color: var(--accent-cyan);
        border-color: rgba(34, 211, 238, 0.35);
        background: rgba(34, 211, 238, 0.08);
      }

      .toggle-password__icon {
        display: none;
      }

      .toggle-password .toggle-password__icon--hidden {
        display: block;
      }

      .toggle-password.is-revealed .toggle-password__icon--hidden {
        display: none;
      }

      .toggle-password.is-revealed .toggle-password__icon--revealed {
        display: block;
      }

      .toggle-password__icon svg {
        width: 16px;
        height: 16px;
        display: block;
      }
    </style>
  </head>
  <body>
    <!-- Cosmic Background -->
    <div class="cosmic-bg">
      <div class="stars"></div>
      <div class="stars-2"></div>
      <div class="nebula nebula-1"></div>
      <div class="nebula nebula-2"></div>
      <div class="shooting-star"></div>
      <div class="shooting-star"></div>
    </div>

    <!-- Auth Content -->
    <div class="auth-page">
      <div class="auth-container">
        <div class="auth-card">
          <!-- Header -->
          <div class="auth-header">
            <a th:href="@{/}" class="auth-logo">
              <div class="auth-logo__icon">
                <i class="bx bx-planet"></i>
              </div>
              <span class="auth-logo__text">ARGATY</span>
            </a>
            <h1 class="auth-title">Đăng ký</h1>
            <p class="auth-subtitle">
              Tạo tài khoản để trải nghiệm mua sắm tuyệt vời
            </p>
          </div>

          <!-- Alerts -->
          <div th:if="${error}" class="alert alert-danger mb-4">
            <i class="bx bx-error-circle"></i>
            <span th:text="${error}">Đăng ký thất bại</span>
          </div>

          <!-- Register Form -->
          <form
            th:action="@{/auth/register}"
            method="post"
            class="auth-form"
            id="registerForm"
          >
            <input
              type="hidden"
              th:name="${_csrf?.parameterName}"
              th:value="${_csrf?.token}"
            />

            <div class="form-group">
              <label class="form-label"
                >Họ và tên <span class="text-danger">*</span></label
              >
              <div class="input-icon">
                <span class="input-icon__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21a8 8 0 0 0-16 0" />
                    <circle cx="12" cy="7" r="4" />
                  </svg>
                </span>
                <input
                  type="text"
                  name="fullName"
                  class="form-control"
                  placeholder="Nhập họ và tên"
                  required
                  th:value="${registerRequest?.fullName}"
                />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label"
                >Email <span class="text-danger">*</span></label
              >
              <div class="input-icon">
                <span class="input-icon__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 6h16v12H4z" />
                    <path d="m4 7 8 6 8-6" />
                  </svg>
                </span>
                <input
                  type="email"
                  name="email"
                  class="form-control"
                  placeholder="Nhập email"
                  required
                  th:value="${registerRequest?.email}"
                />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">Số điện thoại</label>
              <div class="input-icon">
                <span class="input-icon__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 16.92V20a2 2 0 0 1-2.18 2 19.86 19.86 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.86 19.86 0 0 1 2 4.18 2 2 0 0 1 4 2h3.09a2 2 0 0 1 2 1.72c.12.86.31 1.7.57 2.5a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.58-1.12a2 2 0 0 1 2.11-.45c.8.26 1.64.45 2.5.57A2 2 0 0 1 22 16.92z" />
                  </svg>
                </span>
                <input
                  type="tel"
                  name="phone"
                  class="form-control"
                  placeholder="Nhập số điện thoại (tùy chọn)"
                  th:value="${registerRequest?.phone}"
                />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label"
                >Mật khẩu <span class="text-danger">*</span></label
              >
              <div class="input-icon has-toggle">
                <span class="input-icon__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M7 11V8a5 5 0 0 1 10 0v3" />
                    <rect x="5" y="11" width="14" height="10" rx="2" />
                  </svg>
                </span>
                <input
                  type="password"
                  name="password"
                  id="password"
                  class="form-control"
                  placeholder="Nhập mật khẩu (ít nhất 6 ký tự)"
                  required
                  minlength="6"
                />
                <button
                  type="button"
                  class="toggle-password"
                  onclick="togglePassword('password', this)"
                >
                  <span class="toggle-password__icon toggle-password__icon--hidden" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" />
                      <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24" />
                      <path d="M3 3l18 18" />
                    </svg>
                  </span>
                  <span class="toggle-password__icon toggle-password__icon--revealed" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" />
                      <circle cx="12" cy="12" r="3" />
                    </svg>
                  </span>
                </button>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label"
                >Xác nhận mật khẩu <span class="text-danger">*</span></label
              >
              <div class="input-icon has-toggle">
                <span class="input-icon__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M7 11V8a5 5 0 0 1 10 0v3" />
                    <rect x="5" y="11" width="14" height="10" rx="2" />
                  </svg>
                </span>
                <input
                  type="password"
                  name="confirmPassword"
                  id="confirmPassword"
                  class="form-control"
                  placeholder="Nhập lại mật khẩu"
                  required
                />
                <button
                  type="button"
                  class="toggle-password"
                  onclick="togglePassword('confirmPassword', this)"
                >
                  <span class="toggle-password__icon toggle-password__icon--hidden" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" />
                      <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24" />
                      <path d="M3 3l18 18" />
                    </svg>
                  </span>
                  <span class="toggle-password__icon toggle-password__icon--revealed" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" />
                      <circle cx="12" cy="12" r="3" />
                    </svg>
                  </span>
                </button>
              </div>
              <div id="passwordError" class="form-error" style="display: none">
                <i class="bx bx-error"></i> Mật khẩu xác nhận không khớp
              </div>
            </div>

            <div class="form-group">
              <label class="form-check">
                <input
                  type="checkbox"
                  name="agreeTerms"
                  class="form-check-input"
                  required
                />
                <span class="form-check-label">
                  Tôi đồng ý với
                  <a
                    th:href="@{/policy/terms}"
                    target="_blank"
                    class="text-cyan"
                    >Điều khoản sử dụng</a
                  >
                  và
                  <a
                    th:href="@{/policy/privacy}"
                    target="_blank"
                    class="text-cyan"
                    >Chính sách bảo mật</a
                  >
                </span>
              </label>
            </div>

            <button type="submit" class="btn btn-primary btn-lg btn-block">
              <i class="bx bx-user-plus"></i>
              Đăng ký
            </button>
          </form>

          <!-- Divider -->
          <div class="auth-divider">
            <span>Hoặc</span>
          </div>

          <!-- Social Login -->
          <div class="auth-social">
            <a
              th:href="@{/oauth2/authorization/google}"
              class="auth-social__btn"
            >
              <i class="bx bxl-google"></i>
            </a>
            <a
              th:href="@{/oauth2/authorization/facebook}"
              class="auth-social__btn"
            >
              <i class="bx bxl-facebook"></i>
            </a>
          </div>

          <!-- Footer -->
          <div class="auth-footer mt-4">
            <p>Đã có tài khoản? <a th:href="@{/auth/login}">Đăng nhập</a></p>
          </div>
        </div>
      </div>
    </div>

    <script>
      function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        if (input.type === "password") {
          input.type = "text";
          btn.classList.add("is-revealed");
        } else {
          input.type = "password";
          btn.classList.remove("is-revealed");
        }
      }

      // Validate password match
      document
        .getElementById("registerForm")
        .addEventListener("submit", function (e) {
          const password = document.getElementById("password").value;
          const confirmPassword =
            document.getElementById("confirmPassword").value;
          const errorDiv = document.getElementById("passwordError");

          if (password !== confirmPassword) {
            e.preventDefault();
            errorDiv.style.display = "flex";
            document
              .getElementById("confirmPassword")
              .classList.add("is-invalid");
          } else {
            errorDiv.style.display = "none";
            document
              .getElementById("confirmPassword")
              .classList.remove("is-invalid");
          }
        });

      // Real-time password validation
      document
        .getElementById("confirmPassword")
        .addEventListener("input", function () {
          const password = document.getElementById("password").value;
          const confirmPassword = this.value;
          const errorDiv = document.getElementById("passwordError");

          if (confirmPassword && password !== confirmPassword) {
            errorDiv.style.display = "flex";
            this.classList.add("is-invalid");
          } else {
            errorDiv.style.display = "none";
            this.classList.remove("is-invalid");
          }
        });
    </script>
  </body>
</html>
